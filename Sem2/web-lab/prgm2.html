<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <h1>Form</h1>
    <form action="">
        
        <label for="name">Enter name:</label>
        <input type="text" placeholder="Enter your name:"><br><br>

        <label for="email">Enter email:</label>
        <input type="email" placeholder="Enter your email:"><br><br>

        <label for="phone">Enter phone:</label>
        <input type="text" placeholder="Enter your phone:"><br><br>

        <label for="password">Enter password:</label>
        <input type="password" placeholder="Enter your Password"><br><br>

        <label for="qualification">Select qualification</label>
        <select name="qualification" id="qualification">
            <option value="HS">High School</option>
            <option value="DP">Diploma</option>
            <option value="UG">Undergraduate</option>
            <option value="PG">PostGraduate</option>
        </select><br><br>

        <label for="gender">Select Gender:</label>
        <input type="radio" name="Gender" >Male
        <input type="radio" name="Gender">Female
        <input type="radio" name="Gender">Others  <br><br>

        <label for="Message">Message:</label>
        <textarea name="" id=""></textarea><br><br>

        <label> Date of birth:</label>
        <input type="date"><br><br>

        <label>Upload Resume:</label>
        <input type="file" name="" id=""><br><br>
            
        <label for="">Choose your favorite color:</label>
        <input type="color" value="#ff0000"><br><br>

        <label for="">Subscribe to newsletter:</label>
        <input type="checkbox" name="" id=""><br><br>

        <button type="reset">Reset</button>
        <button type="submit">Submit</button>


    </form>
    
</body>
</html>
